# metrics-support-matrix.yaml -- single source of truth for GPU metric support
# Gap classes: C=correct, D=doc-wrong-actually-works, N=genuinely-unsupported
# Metric names match exporterconfig.proto GPUMetricField enum exactly.
# Excludes GPU_PROF_* (profiler metrics disabled on SR-IOV by design).
# hypervisor_guest is out of scope for GPUOP-880 (false for all).
version: 1
metrics:
  # -- System --
  - name: GPU_NODES_TOTAL
    category: system
    platforms: [MI2xx, MI3xx]
    baremetal: true
    hypervisor_host: true
    hypervisor_guest: false
    class: C
    notes: ""
  - name: GPU_HEALTH
    category: system
    platforms: [MI2xx, MI3xx]
    baremetal: true
    hypervisor_host: true
    hypervisor_guest: false
    class: C
    notes: "computed health flag"

  # -- Temperature --
